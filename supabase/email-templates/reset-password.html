<!--
  Paste this into: Supabase Dashboard → Authentication → Email Templates → "Reset Password"
  Subject line suggestion: Reset your JesDanPay password

  Uses inline styles + a table layout on purpose — email clients like Gmail
  strip <style> blocks in <head>, which would leave this rendering completely
  unstyled for a large share of recipients. Don't reintroduce a <style> tag.

  Logo URL assumes the app is live at https://jesdanpay.net — swap the src
  below if the deployed app ends up on a different domain. Email clients
  can't load images from localhost.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5faf7; padding:40px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:16px; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
        <tr>
          <td style="padding:40px 40px 24px 40px; text-align:center;">
            <img src="https://jesdanpay.net/jesdanpay-logo.png" alt="JesDanPay" width="160" style="display:block; margin:0 auto;" />
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 8px 40px;">
            <h1 style="margin:0; font-size:22px; line-height:30px; color:#125236; text-align:center;">
              Reset your password
            </h1>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 40px 24px 40px;">
            <p style="margin:0; font-size:15px; line-height:23px; color:#4b5563; text-align:center;">
              We received a request to reset the password for your JesDanPay account. Click the
              button below to set a new password.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 24px 40px; text-align:center;">
            <a
              href="{{ .ConfirmationURL }}"
              style="display:inline-block; background-color:#1b7a4b; color:#ffffff; font-size:15px; font-weight:600; text-decoration:none; padding:14px 32px; border-radius:12px;"
            >
              Reset password
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 32px 40px;">
            <p style="margin:0; font-size:13px; line-height:18px; color:#9ca3af; text-align:center;">
              If you didn't request this, you can safely ignore this email.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 40px 40px; border-top:1px solid #eeeef1; padding-top:24px; text-align:center;">
            <p style="margin:0; font-size:13px; line-height:18px; color:#9ca3af;">
              JesDanPay ·
              <a href="mailto:support@jesdanpay.com" style="color:#1b7a4b; text-decoration:none;">support@jesdanpay.com</a>
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
