<!--
  Paste this into: Supabase Dashboard → Authentication → Email Templates → "Confirm signup"
  Subject line suggestion: Confirm your JesDanPay email

  Logo URL below assumes the app will be live at https://jesdanpay.net — if the
  deployed app ends up on a different domain (e.g. a Vercel subdomain), swap the
  src below to match. Email clients can't load images from localhost, so the logo
  won't render until this points at the real deployed address.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7; padding:40px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:16px; overflow:hidden; font-family:Arial, Helvetica, sans-serif;">
        <tr>
          <td style="padding:40px 40px 24px 40px; text-align:center;">
            <img src="https://jesdanpay.net/jesdanpay-logo.png" alt="JesDanPay" width="160" style="display:block; margin:0 auto;" />
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 8px 40px;">
            <h1 style="margin:0; font-size:20px; line-height:28px; color:#171717; text-align:center;">
              Confirm your email address
            </h1>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 40px 32px 40px;">
            <p style="margin:0; font-size:14px; line-height:22px; color:#666666; text-align:center;">
              Click the button below to confirm your email and finish setting up your JesDanPay account.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 32px 40px; text-align:center;">
            <a
              href="{{ .ConfirmationURL }}"
              style="display:inline-block; background-color:#1b7a4b; color:#ffffff; font-size:14px; font-weight:bold; text-decoration:none; padding:14px 32px; border-radius:12px;"
            >
              Confirm email address
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:0 40px 40px 40px;">
            <p style="margin:0; font-size:12px; line-height:18px; color:#a0a0a0; text-align:center;">
              If you didn't create a JesDanPay account, you can safely ignore this email.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 40px; background-color:#f5f5f7; text-align:center;">
            <p style="margin:0; font-size:11px; line-height:16px; color:#a0a0a0;">
              JesDanPay — cross-border currency exchange between Nigeria and China.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
