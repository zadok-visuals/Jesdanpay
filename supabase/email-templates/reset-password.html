<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5faf7;
      color: #171717;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .logo {
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #125236;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 24px;
      color: #4b5563;
    }
    .button {
      display: inline-block;
      background-color: #1b7a4b;
      color: #ffffff !important;
      font-weight: 500;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
    }
    .footer {
      margin-top: 40px;
      border-top: 1px solid #eeeef1;
      padding-top: 24px;
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
    }
    .footer a {
      color: #1b7a4b;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <!-- Use your actual hosted logo URL here -->
      <h2 style="color: #1b7a4b; margin: 0;">JesDanPay</h2>
    </div>
    <h1>Reset your password</h1>
    <p>We received a request to reset the password for your JesDanPay account. Click the button below to set a new password.</p>
    <a href="{{ .ConfirmationURL }}" class="button">Reset Password</a>
    <p style="margin-top: 24px; font-size: 14px;">If you didn't request this, you can safely ignore this email.</p>
    <div class="footer">
      <p>JesDanPay · <a href="mailto:support@jesdanpay.com">support@jesdanpay.com</a></p>
    </div>
  </div>
</body>
</html>
